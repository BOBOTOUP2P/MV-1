<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDC Bank Payments with Direct Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .payment-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
            padding: 24px;
            text-align: center;
        }

        .logo {
            font-weight: bold;
            color: #003b95;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .sub-logo {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }

        .amount-container {
            background-color: #f0f4fa;
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
            border: 1px solid #b3d1ff;
        }

        .amount-label {
            font-size: 13px;
            color: #555;
        }

        .amount-display {
            font-size: 30px;
            font-weight: bold;
            color: #003b95;
        }

        .row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #444;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background-color: #fff;
        }

        .btn-generate {
            width: 100%;
            padding: 14px;
            background-color: #003b95;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-generate:hover {
            background-color: #002663;
        }

        .qr-section {
            margin-top: 24px;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        #qrcode {
            padding: 12px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .status-text {
            font-size: 13px;
            color: #ef6c00;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .success-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: scaleUp 0.4s ease-in-out forwards;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background-color: #2e7d32;
            color: #fff;
            font-size: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.4);
        }

        .success-title {
            font-size: 20px;
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 8px;
        }

        .success-desc {
            font-size: 14px;
            color: #555;
        }

        @keyframes scaleUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="payment-card">
        <div id="paymentForm">
            <div class="logo">BIDC BANK KHQR</div>
            <div class="sub-logo">ម្ចាស់គណនី៖ HORT SAOMONA</div>
            
            <div class="amount-container">
                <div class="amount-label">ទឹកប្រាក់ផ្ទេរចូល</div>
                <div class="amount-display" id="totalDisplay">$0.00</div>
            </div>

            <div class="row">
                <div class="form-group" style="flex: 1;">
                    <label for="currencySelect">រូបិយប័ណ្ណ</label>
                    <select id="currencySelect" onchange="updateDisplay()">
                        <option value="USD">USD ($)</option>
                        <option value="KHR">KHR (៛)</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 2;">
                    <label for="amountInput">ចំនួនទឹកប្រាក់</label>
                    <input type="number" id="amountInput" placeholder="0.00" oninput="updateDisplay()">
                </div>
            </div>

            <button class="btn-generate" onclick="generatePaymentQR()">បង្កើត QR Code</button>
        </div>

        <div class="qr-section" id="qrSection">
            <div id="qrcode"></div>
            <div class="status-text">
                <span>🔄</span> កំពុងរង់ចាំលោកអ្នកស្កេនទូទាត់...
            </div>
        </div>

        <div class="success-screen" id="successScreen">
            <div class="success-icon">✓</div>
            <div class="success-title">ទូទាត់ជោគជ័យ!</div>
            <div class="success-desc" id="successDesc">លោកអ្នកបានផ្ទេរប្រាក់រួចរាល់។</div>
        </div>
    </div>

    <script>
        let checkPaymentInterval = null;

        function updateDisplay() {
            const amountInput = document.getElementById('amountInput');
            const currency = document.getElementById('currencySelect').value;
            const val = parseFloat(amountInput.value);

            if (!isNaN(val) && val >= 0) {
                if (currency === "USD") {
                    document.getElementById('totalDisplay').innerText = `$${val.toFixed(2)}`;
                } else {
                    document.getElementById('totalDisplay').innerText = `${Math.round(val).toLocaleString()} ៛`;
                }
            } else {
                document.getElementById('totalDisplay').innerText = currency === "USD" ? "$0.00" : "0 ៛";
            }
        }

        function getCRC16(data) {
            let crc = 0xFFFF;
            for (let i = 0; i < data.length; i++) {
                crc ^= (data.charCodeAt(i) << 8);
                for (let j = 0; j < 8; j++) {
                    if ((crc & 0x8000) !== 0) {
                        crc = (crc << 1) ^ 0x1021;
                    } else {
                        crc <<= 1;
                    }
                }
            }
            return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
        }

        function generatePaymentQR() {
            const amountInput = document.getElementById('amountInput').value;
            const currency = document.getElementById('currencySelect').value;
            const amount = parseFloat(amountInput);

            if (isNaN(amount) || amount <= 0) {
                alert("សូមបញ្ចូលចំនួនទឹកប្រាក់ឱ្យបានត្រឹមត្រូវ។");
                return;
            }

            const qrSection = document.getElementById('qrSection');
            const qrCodeDiv = document.getElementById('qrcode');
            const paymentForm = document.getElementById('paymentForm');

            qrCodeDiv.innerHTML = '';
            clearInterval(checkPaymentInterval);

            // កូដគំរូធនាគារ BIDC Bank ផ្លូវការរបស់បង
            let rawQR = "00020101021129490016idbckhppxxx@idbc01127037007971050209BIDC BANK52045999";
            
            let currencyCode = currency === "KHR" ? "116" : "840";
            rawQR += "5303" + currencyCode;
            rawQR += "5802KH";
            rawQR += "5912HORT SAOMONA";
            rawQR += "6009BIDC BANK";
            rawQR += "6304";
            
            const crc = getCRC16(rawQR);
            const finalQRString = rawQR + crc;

            paymentForm.style.display = 'none';
            qrSection.style.display = 'flex';

            new QRCode(qrCodeDiv, {
                text: finalQRString,
                width: 180,
                height: 180,
                correctLevel: QRCode.CorrectLevel.M
            });

            // 🔄 ចាប់ផ្តើមឆែកស្ថានភាពលុយចូលរៀងរាល់ ២ វិនាទីម្តង
            checkPaymentInterval = setInterval(() => {
                trackPaymentStatus(amount, currency);
            }, 2000);
        }

        async function trackPaymentStatus(amount, currency) {
            try {
                // ហៅទៅកាន់ API របស់ Vercel ផ្ទាល់ខ្លួនដើម្បីឆែកមើលស្ថានភាព
                const response = await fetch("/api/check_payment", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ amount: amount })
                });

                if (response.ok) {
                    const statusData = await response.json();
                    if (statusData.success === true) {
                        clearInterval(checkPaymentInterval);
                        showSuccessScreen(amount, currency);
                    }
                }
            } catch (error) {
                console.error("កំពុងរង់ចាំការទូទាត់...", error);
            }
        }

        function showSuccessScreen(amount, currency) {
            const qrSection = document.getElementById('qrSection');
            const successScreen = document.getElementById('successScreen');
            const successDesc = document.getElementById('successDesc');

            qrSection.style.display = 'none';
            successScreen.style.display = 'flex';

            const formattedAmount = currency === "USD" ? `$${amount.toFixed(2)}` : `${Math.round(amount).toLocaleString()} ៛`;
            successDesc.innerText = `បានទទួលប្រាក់ចំនួន ${formattedAmount} ដោយជោគជ័យ!`;
        }
    </script>
</body>
</html>
