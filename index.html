<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakong Real-time Payment Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .payment-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 380px;
            padding: 24px;
            text-align: center;
        }

        .logo {
            font-weight: bold;
            color: #d32f2f;
            font-size: 22px;
            margin-bottom: 20px;
        }

        .amount-container {
            background-color: #fdf2f2;
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
            border: 1px solid #fbcaca;
        }

        .amount-label {
            font-size: 13px;
            color: #777;
            margin-bottom: 6px;
        }

        .amount-display {
            font-size: 28px;
            font-weight: bold;
            color: #d32f2f;
        }

        .row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #444;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            background-color: #fff;
        }

        .btn-generate {
            width: 100%;
            padding: 14px;
            background-color: #d32f2f;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .qr-section {
            margin-top: 24px;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        #qrcode {
            padding: 12px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .status-text {
            font-size: 13px;
            color: #ef6c00;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .success-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: scaleUp 0.4s ease-in-out forwards;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background-color: #2e7d32;
            color: #fff;
            font-size: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.4);
        }

        .success-title {
            font-size: 20px;
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 8px;
        }

        .success-desc {
            font-size: 14px;
            color: #555;
        }

        .error-box {
            display: none;
            margin-top: 20px;
            padding: 12px;
            background-color: #ffebee;
            border: 1px solid #ffcdd2;
            border-radius: 8px;
            color: #c62828;
            font-size: 12px;
            text-align: left;
            word-break: break-all;
        }

        @keyframes scaleUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="payment-card" id="cardContent">
        <div id="paymentForm">
            <div class="logo">KHQR REAL-TIME</div>
            <div class="amount-container">
                <div class="amount-label">ទឹកប្រាក់ផ្ទេរចូល</div>
                <div class="amount-display" id="totalDisplay">$0.00</div>
            </div>

            <div class="row">
                <div class="form-group" style="flex: 1;">
                    <label for="currencySelect">រូបិយប័ណ្ណ</label>
                    <select id="currencySelect" onchange="updateDisplay()">
                        <option value="USD">USD ($)</option>
                        <option value="KHR">KHR (៛)</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 2;">
                    <label for="amountInput">ចំនួនទឹកប្រាក់</label>
                    <input type="number" id="amountInput" placeholder="0.00" oninput="updateDisplay()">
                </div>
            </div>

            <button class="btn-generate" onclick="generatePaymentQR()">បង្កើត QR Code ទូទាត់</button>
        </div>

        <div class="qr-section" id="qrSection">
            <div id="qrcode"></div>
            <div class="status-text">
                <span>🔄</span> កំពុងរង់ចាំលោកអ្នកស្កេនទូទាត់...
            </div>
        </div>

        <div class="success-screen" id="successScreen">
            <div class="success-icon">✓</div>
            <div class="success-title">ទូទាត់ជោគជ័យ!</div>
            <div class="success-desc" id="successDesc">លោកអ្នកបានផ្ទេរប្រាក់រួចរាល់។</div>
        </div>

        <div class="error-box" id="errorBox"></div>
    </div>

    <script>
        let checkPaymentInterval = null;

        function updateDisplay() {
            const amountInput = document.getElementById('amountInput');
            const currency = document.getElementById('currencySelect').value;
            const val = parseFloat(amountInput.value);

            if (!isNaN(val) && val >= 0) {
                if (currency === "USD") {
                    document.getElementById('totalDisplay').innerText = `$${val.toFixed(2)}`;
                } else {
                    document.getElementById('totalDisplay').innerText = `${Math.round(val).toLocaleString()} ៛`;
                }
            } else {
                document.getElementById('totalDisplay').innerText = currency === "USD" ? "$0.00" : "0 ៛";
            }
        }

        async function generatePaymentQR() {
            const amountInput = document.getElementById('amountInput').value;
            const currency = document.getElementById('currencySelect').value;
            const amount = parseFloat(amountInput);

            if (isNaN(amount) || amount <= 0) {
                alert("សូមបញ្ចូលចំនួនទឹកប្រាក់ឱ្យបានត្រឹមត្រូវ។");
                return;
            }

            const qrSection = document.getElementById('qrSection');
            const qrCodeDiv = document.getElementById('qrcode');
            const paymentForm = document.getElementById('paymentForm');
            const errorBox = document.getElementById('errorBox');

            qrCodeDiv.innerHTML = '';
            errorBox.style.display = 'none';
            clearInterval(checkPaymentInterval);

            try {
                // ហៅទៅកាន់ Vercel Serverless Function (Backend ផ្ទាល់ខ្លួន)
                const response = await fetch("/api/generate", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        amount: amount,
                        currency: currency
                    })
                });

                const data = await response.json();

                if (response.ok && data.responseCode === 0) {
                    paymentForm.style.display = 'none';
                    qrSection.style.display = 'flex';

                    new QRCode(qrCodeDiv, {
                        text: data.data.qrCode,
                        width: 180,
                        height: 180,
                        correctLevel: QRCode.CorrectLevel.M
                    });

                    checkPaymentInterval = setInterval(() => {
                        trackPaymentStatus(data.data.md5, amount, currency);
                    }, 2500);

                } else {
                    throw new Error(data.responseMessage || `Error Code: ${data.responseCode}`);
                }

            } catch (error) {
                console.error(error);
                errorBox.style.display = 'block';
                errorBox.innerText = "ការស្នើសុំបង្កើត QR បរាជ័យ៖ " + error.message;
            }
        }

        async function trackPaymentStatus(md5Hash, amount, currency) {
            try {
                const response = await fetch("/api/check", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ md5: md5Hash })
                });

                if (response.ok) {
                    const statusData = await response.json();
                    if (statusData.responseCode === 0) {
                        clearInterval(checkPaymentInterval);
                        showSuccessScreen(amount, currency);
                    }
                }
            } catch (error) {
                console.error("កំពុងឆែកស្ថានភាព...", error);
            }
        }

        function showSuccessScreen(amount, currency) {
            const qrSection = document.getElementById('qrSection');
            const successScreen = document.getElementById('successScreen');
            const successDesc = document.getElementById('successDesc');

            qrSection.style.display = 'none';
            successScreen.style.display = 'flex';

            const formattedAmount = currency === "USD" ? `$${amount.toFixed(2)}` : `${Math.round(amount).toLocaleString()} ៛`;
            successDesc.innerText = `បានទទួលប្រាក់ចំនួន ${formattedAmount} ដោយជោគជ័យ!`;
        }
    </script>
</body>
</html>
